<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>As Peças da Nossa História</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="particles"></div>
<section id="home" class="screen active">
  <div class="card">
    <h1>❤️ Para meu amoziiii ❤️</h1>
    <p>Uma surpresa feita para Letícia, minha princesinha.</p>
    <div id="counter"></div>
    <button id="startBtn">Começar</button>
  </div>
</section>

<section id="puzzle" class="screen">
  <h2 id="phaseTitle"></h2>
  <div class="phone-frame"><div id="board"></div></div>
  <button id="completeBtn">Simular Puzzle Concluído</button>
</section>

<section id="message" class="screen">
  <div class="card">
    <h2 id="msgTitle"></h2>
    <p id="msgText"></p>
    <button id="nextBtn">Continuar</button>
  </div>
</section>

<section id="gallery" class="screen">
  <h1>Nossas Memórias</h1>
  <div class="gallery">
    <img src="img/foto1.jpg"><img src="img/foto2.jpg">
    <img src="img/foto3.jpg"><img src="img/foto4.jpg">
  </div>
  <button id="letterBtn">Abrir Carta</button>
</section>

<section id="letter" class="screen">
  <div class="card">
    <h1>💌</h1>
    <p id="typed"></p>
    <button id="videoBtn">Final</button>
  </div>
</section>

<section id="final" class="screen">
  <div class="card">
    <h1>Eu te amo, Letícia ❤️</h1>
    <p>Obrigado por cada momento.</p>
  </div>
</section>
<script src="app.js"></script>
</body>
</html>
